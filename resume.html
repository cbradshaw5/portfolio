<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="max-w-5xl mx-auto py-12 px-6">
        <section class="mb-12">
            <h2 class="text-3xl font-bold text-primary mb-6">Education</h2>
            <div class="glass-card p-6">
                <p class="text-xl font-bold">Salisbury University | 4.0 GPA [cite: 81]</p>
                <p class="text-slate-400">B.S. Computer Science & Data Science (Expected 2027) [cite: 79]</p>
            </div>
        </section>
        <section>
            <h2 class="text-3xl font-bold text-primary mb-6">Technical Skills</h2>
            <div class="flex flex-wrap gap-3">
                <span class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-700">C++</span>
                <span class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-700">Python</span>
                <span class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-700">ROS2</span>
                <span class="px-4 py-2 bg-slate-800 rounded-lg border border-slate-700">Linux</span>
            </div>
        </section>
    </main>
    </body>
</html>
